<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 90" fill="none">
  <!-- Sun arc -->
  <path d="M70 58 A30 30 0 0 1 130 58" stroke="#F59E0B" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Sun rays -->
  <line x1="100" y1="18" x2="100" y2="11" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="23" x2="75" y2="17" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="65" y1="38" x2="58" y2="34" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="62" y1="55" x2="55" y2="54" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="120" y1="23" x2="125" y2="17" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="135" y1="38" x2="142" y2="34" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="138" y1="55" x2="145" y2="54" stroke="#F59E0B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Solar panel body (parallelogram) -->
  <polygon points="72,62 105,35 140,48 107,75" fill="#1E40AF"/>
  <!-- Panel grid lines horizontal -->
  <line x1="80" y1="56" x2="113" y2="41" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <line x1="88" y1="68" x2="121" y2="53" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <!-- Panel grid lines vertical -->
  <line x1="88" y1="38" x2="79" y2="69" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <line x1="107" y1="35" x2="98" y2="66" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <line x1="124" y1="43" x2="115" y2="74" stroke="#93C5FD" stroke-width="1" opacity="0.5"/>
  <!-- Panel highlight -->
  <polygon points="72,62 105,35 112,37 79,65" fill="#3B82F6" opacity="0.4"/>
  <!-- SOLARTOALL text -->
  <text x="8" y="86" font-family="'Outfit', 'Arial Black', sans-serif" font-weight="900" font-size="21" letter-spacing="-0.5">
    <tspan fill="#1E3A6E">SOLAR</tspan><tspan fill="#F59E0B">TO</tspan><tspan fill="#1E3A6E">ALL</tspan><tspan fill="#3B82F6" font-size="8" dy="-10">.com</tspan>
  </text>
  <!-- Tagline -->
  <line x1="8" y1="91" x2="45" y2="91" stroke="#1E3A6E" stroke-width="1.2"/>
  <text x="50" y="94" font-family="'Outfit', Arial, sans-serif" font-size="7.5" fill="#1E3A6E" letter-spacing="1.8" font-weight="500">ENERGY FOR EVERYONE</text>
  <line x1="195" y1="91" x2="232" y2="91" stroke="#1E3A6E" stroke-width="1.2"/>
</svg>
